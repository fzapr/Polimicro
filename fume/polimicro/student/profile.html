<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['mahasiswa'])) throw '';
    const user = Auth.getCurrentUser();
    document.getElementById('app').innerHTML = buildSidebar('mahasiswa', 'profile') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Pengaturan Profil</h1>
      <div class="grid lg:grid-cols-3 gap-6">
        <!-- Avatar Card -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6 text-center">
          <div class="w-24 h-24 mx-auto rounded-full gradient-primary flex items-center justify-center text-white text-3xl font-bold mb-4">${Utils.getInitials(user.nama)}</div>
          <h3 class="font-bold text-lg">${user.nama}</h3>
          <p class="text-gray-500 text-sm">${user.email}</p>
          <p class="text-xs mt-2">${Utils.statusBadge(user.status)}</p>
          <p class="text-gray-400 text-xs mt-3">NIM: ${user.nim || '-'}</p>
        </div>
        <!-- Profile Form -->
        <div class="lg:col-span-2 space-y-6">
          <div class="bg-white rounded-2xl border border-gray-100 p-6">
            <h3 class="font-bold text-gray-900 mb-4"><i class="fas fa-user mr-2 text-green-600"></i>Data Pribadi</h3>
            <form id="profile-form" class="space-y-4">
              <div class="grid md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-gray-600 mb-1">Nama Lengkap</label><input type="text" id="pNama" value="${user.nama}" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white"></div>
                <div><label class="block text-sm font-medium text-gray-600 mb-1">Email</label><input type="email" value="${user.email}" disabled class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-400"></div>
                <div><label class="block text-sm font-medium text-gray-600 mb-1">No. Telepon</label><input type="tel" id="pPhone" value="${user.phone || ''}" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white"></div>
                <div><label class="block text-sm font-medium text-gray-600 mb-1">Alamat</label><input type="text" id="pAddress" value="${user.address || ''}" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white"></div>
              </div>
              <button type="submit" class="px-6 py-3 btn-primary text-white rounded-xl font-semibold"><i class="fas fa-save mr-2"></i>Simpan Perubahan</button>
            </form>
          </div>
          <div class="bg-white rounded-2xl border border-gray-100 p-6">
            <h3 class="font-bold text-gray-900 mb-4"><i class="fas fa-lock mr-2 text-green-600"></i>Ubah Password</h3>
            <form id="pw-form" class="space-y-4">
              <div><label class="block text-sm font-medium text-gray-600 mb-1">Password Lama</label><input type="password" id="oldPw" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
              <div class="grid md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-gray-600 mb-1">Password Baru</label><input type="password" id="newPw" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
                <div><label class="block text-sm font-medium text-gray-600 mb-1">Konfirmasi Password</label><input type="password" id="confirmPw" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
              </div>
              <button type="submit" class="px-6 py-3 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-semibold transition"><i class="fas fa-key mr-2"></i>Ubah Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>` + closeSidebarLayout();

    document.getElementById('profile-form').addEventListener('submit', e => {
      e.preventDefault();
      Auth.updateProfile(user.id, { nama: document.getElementById('pNama').value, phone: document.getElementById('pPhone').value, address: document.getElementById('pAddress').value });
      Utils.showToast('Profil berhasil diperbarui!');
    });
    document.getElementById('pw-form').addEventListener('submit', e => {
      e.preventDefault();
      if (document.getElementById('newPw').value !== document.getElementById('confirmPw').value) { Utils.showToast('Password tidak cocok!', 'error'); return; }
      const r = Auth.changePassword(user.id, document.getElementById('oldPw').value, document.getElementById('newPw').value);
      Utils.showToast(r.message, r.success ? 'success' : 'error');
      if (r.success) document.getElementById('pw-form').reset();
    });
  </script>
</body>
</html>
