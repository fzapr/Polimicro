<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertifikat - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <!-- Certificate Preview Modal -->
  <div id="cert-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full mx-4 overflow-hidden fade-in">
      <div id="cert-preview" class="p-8"></div>
      <div class="flex gap-3 p-6 border-t border-gray-100" style="border-color:#e8e4df">
        <button onclick="closeCertModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Tutup</button>
        <button onclick="downloadCert()" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold"><i class="fas fa-download mr-2"></i>Download</button>
      </div>
    </div>
  </div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['mahasiswa'])) throw '';
    const user = Auth.getCurrentUser();
    const certs = PoliData.getSertifikatByMahasiswa(user.id);

    document.getElementById('app').innerHTML = buildSidebar('mahasiswa', 'certificates') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Sertifikat Saya</h1>
      <p class="text-gray-500 mb-6">Download sertifikat kelulusan program yang telah Anda selesaikan</p>
      <div class="grid md:grid-cols-2 gap-6">
        ${certs.map(c => {
          const prodi = PoliData.getProdiById(c.prodi_id);
          return `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden card-hover">
            <div class="gradient-card p-6 text-center border-b border-green-200">
              <div class="w-16 h-16 mx-auto rounded-full bg-white shadow-lg flex items-center justify-center mb-3"><i class="fas fa-award text-green-600 text-2xl"></i></div>
              <h3 class="font-bold text-green-900 text-lg">Sertifikat Kelulusan</h3>
              <p class="text-green-700">${prodi ? prodi.nama : '-'}</p>
            </div>
            <div class="p-6">
              <div class="space-y-3 text-sm mb-6">
                <div class="flex justify-between"><span class="text-gray-400">Nomor</span><span class="font-medium font-mono text-xs">${c.nomor_sertifikat}</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Tanggal Terbit</span><span class="font-medium">${Utils.formatDate(c.tanggal_terbit)}</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Status</span>${Utils.statusBadge(c.status)}</div>
              </div>
              <div class="flex gap-2">
                <button onclick="previewCert(${c.id})" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium text-sm hover:bg-gray-200 transition"><i class="fas fa-eye mr-1"></i>Preview</button>
                <button onclick="downloadCert()" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold text-sm"><i class="fas fa-download mr-1"></i>Download</button>
              </div>
            </div>
          </div>`;
        }).join('')}
        ${certs.length === 0 ? '<div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100" style="border-color:#e8e4df"><i class="fas fa-certificate text-4xl text-gray-300 mb-4"></i><p class="text-gray-400">Belum ada sertifikat. Selesaikan program untuk mendapatkan sertifikat.</p></div>' : ''}
      </div>
    </main>` + closeSidebarLayout();

    function previewCert(certId) {
      const c = PoliData.sertifikat.find(s => s.id === certId);
      const prodi = PoliData.getProdiById(c.prodi_id);
      document.getElementById('cert-preview').innerHTML = `
        <div class="border-4 border-green-700 p-8 text-center rounded-xl">
          <div class="border-2 border-green-300 p-6 rounded-lg">
            <div class="flex items-center justify-center gap-3 mb-4"><div class="w-12 h-12 rounded-xl gradient-primary flex items-center justify-center text-white"><i class="fas fa-graduation-cap text-xl"></i></div><span class="text-2xl font-bold text-green-800">Polimicro</span></div>
            <h2 class="text-3xl font-bold text-gray-800 mt-6 mb-2">SERTIFIKAT</h2>
            <p class="text-gray-500 mb-6">Kelulusan Program Microcredential</p>
            <p class="text-gray-600 mb-2">Diberikan kepada:</p>
            <h3 class="text-2xl font-bold text-green-800 mb-4">${user.nama}</h3>
            <p class="text-gray-600 mb-1">Telah menyelesaikan program studi</p>
            <h4 class="text-xl font-bold text-gray-800 mb-6">${prodi ? prodi.nama : ''}</h4>
            <p class="text-sm text-gray-400 mb-1">No: ${c.nomor_sertifikat}</p>
            <p class="text-sm text-gray-400">Tanggal: ${Utils.formatDate(c.tanggal_terbit)}</p>
          </div>
        </div>`;
      document.getElementById('cert-modal').classList.remove('hidden');
      document.getElementById('cert-modal').classList.add('flex');
    }
    function closeCertModal() { document.getElementById('cert-modal').classList.add('hidden'); document.getElementById('cert-modal').classList.remove('flex'); }
    function downloadCert() { Utils.showToast('Sertifikat berhasil didownload! (simulasi)'); closeCertModal(); }
  </script>
</body>
</html>
