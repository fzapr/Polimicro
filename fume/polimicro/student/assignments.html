<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <!-- Submit Modal -->
  <div id="submit-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full mx-4 fade-in">
      <h3 class="text-xl font-bold mb-1" id="sm-title"></h3>
      <p class="text-gray-500 text-sm mb-6" id="sm-desc"></p>
      <form id="submit-form" class="space-y-4">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Upload File</label>
          <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:border-green-400 transition cursor-pointer" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-2"></i>
            <p class="text-sm text-gray-500">Klik untuk upload file</p>
            <p class="text-xs text-gray-400 mt-1" id="file-name">Belum ada file dipilih</p>
            <input type="file" id="file-input" class="hidden" onchange="document.getElementById('file-name').textContent=this.files[0]?.name||'Belum ada file'">
          </div>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeSubmitModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Batal</button>
          <button type="submit" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold">Kumpulkan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['mahasiswa'])) throw '';
    const user = Auth.getCurrentUser();
    const enrolled = PoliData.getEnrolledMatkul(user.id);
    const mySubs = PoliData.getSubmissionsByMahasiswa(user.id);
    const params = new URLSearchParams(window.location.search);
    const filterMatkul = params.get('matkul');
    let currentTugasId = null;

    document.getElementById('app').innerHTML = buildSidebar('mahasiswa', 'assignments') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Tugas</h1>
      <p class="text-gray-500 mb-6">Lihat dan kerjakan tugas dari dosen Anda</p>
      <select id="filter" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm mb-6">
        <option value="all">Semua Mata Kuliah</option>
        ${enrolled.map(m => `<option value="${m.id}" ${filterMatkul == m.id ? 'selected' : ''}>${m.nama}</option>`).join('')}
      </select>
      <div id="tugas-list" class="space-y-4"></div>
    </main>` + closeSidebarLayout();

    function render() {
      const f = document.getElementById('filter').value;
      let matkuls = f === 'all' ? enrolled : enrolled.filter(m => m.id == f);
      const list = document.getElementById('tugas-list');
      let html = '';
      matkuls.forEach(m => {
        const tasks = PoliData.getTugasByMatkul(m.id);
        if (!tasks.length) return;
        html += `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div class="p-5 border-b border-gray-50"><h3 class="font-bold text-gray-900">${m.nama}</h3></div>
          <div class="divide-y divide-gray-50">${tasks.map(t => {
            const sub = mySubs.find(s => s.tugas_id === t.id);
            const statusHtml = sub ? (sub.nilai !== null ? `<span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">Dinilai: ${sub.nilai}</span>` : `<span class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Dikumpul</span>`) : `<span class="px-3 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700">Belum dikumpul</span>`;
            return `<div class="p-5 hover:bg-gray-50/50 transition">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1"><p class="font-semibold">${t.judul}</p><p class="text-sm text-gray-500 mt-1">${t.deskripsi}</p>
                  <div class="flex flex-wrap gap-3 mt-3 text-xs text-gray-400">
                    <span><i class="fas fa-calendar mr-1"></i>Deadline: ${Utils.formatDate(t.deadline)}</span>
                    <span><i class="fas fa-star mr-1"></i>Maks: ${t.max_nilai}</span>
                  </div>
                </div>
                <div class="flex flex-col items-end gap-2">${statusHtml}
                  ${!sub ? `<button onclick="openSubmit(${t.id},'${t.judul.replace(/'/g,"\\'")}','${t.deskripsi.replace(/'/g,"\\'")}')" class="px-4 py-2 btn-primary text-white rounded-lg text-xs font-medium"><i class="fas fa-upload mr-1"></i>Kumpul</button>` : ''}
                </div>
              </div>
              ${sub && sub.feedback ? `<div class="mt-3 p-3 bg-green-50 rounded-xl text-sm text-green-700"><i class="fas fa-comment mr-1"></i><b>Feedback:</b> ${sub.feedback}</div>` : ''}
            </div>`;
          }).join('')}</div>
        </div>`;
      });
      list.innerHTML = html || '<div class="text-center py-16 text-gray-400"><i class="fas fa-clipboard text-4xl mb-4"></i><p>Belum ada tugas</p></div>';
    }

    function openSubmit(tugasId, title, desc) {
      currentTugasId = tugasId;
      document.getElementById('sm-title').textContent = title;
      document.getElementById('sm-desc').textContent = desc;
      document.getElementById('submit-modal').classList.remove('hidden');
      document.getElementById('submit-modal').classList.add('flex');
    }
    function closeSubmitModal() { document.getElementById('submit-modal').classList.add('hidden'); document.getElementById('submit-modal').classList.remove('flex'); }

    document.getElementById('submit-form').addEventListener('submit', e => {
      e.preventDefault();
      const fi = document.getElementById('file-input');
      const fileName = fi.files[0] ? fi.files[0].name : 'submission_' + user.nim + '.pdf';
      PoliData.submissions.push({ id: Utils.generateId(PoliData.submissions), tugas_id: currentTugasId, mahasiswa_id: user.id, file_url: fileName, submitted_at: new Date().toISOString().split('T')[0], nilai: null, feedback: null });
      saveData(); closeSubmitModal(); render(); Utils.showToast('Tugas berhasil dikumpulkan!');
    });

    document.getElementById('filter').addEventListener('change', render);
    render();
  </script>
</body>
</html>
