<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['mahasiswa'])) throw '';
    const user = Auth.getCurrentUser();
    const enrolled = PoliData.getEnrolledMatkul(user.id);
    const params = new URLSearchParams(window.location.search);
    const filterMatkul = params.get('matkul');

    document.getElementById('app').innerHTML = buildSidebar('mahasiswa', 'materials') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Materi Pembelajaran</h1>
      <p class="text-gray-500 mb-6">Akses materi dari mata kuliah yang Anda ikuti</p>
      <div class="mb-6">
        <select id="filter" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm">
          <option value="all">Semua Mata Kuliah</option>
          ${enrolled.map(m => `<option value="${m.id}" ${filterMatkul == m.id ? 'selected' : ''}>${m.nama}</option>`).join('')}
        </select>
      </div>
      <div id="materi-list" class="space-y-4"></div>
    </main>` + closeSidebarLayout();

    function render() {
      const f = document.getElementById('filter').value;
      const list = document.getElementById('materi-list');
      let matkuls = f === 'all' ? enrolled : enrolled.filter(m => m.id == f);
      let html = '';
      matkuls.forEach(m => {
        const items = PoliData.getMateriByMatkul(m.id);
        if (items.length === 0) return;
        html += `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div class="p-5 border-b border-gray-50 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center text-white"><i class="fas fa-book"></i></div>
            <div><h3 class="font-bold text-gray-900">${m.nama}</h3><p class="text-xs text-gray-400">${items.length} materi tersedia</p></div>
          </div>
          <div class="divide-y divide-gray-50">
            ${items.map(mat => `<div class="p-5 hover:bg-green-50/50 transition cursor-pointer" onclick="this.querySelector('.detail').classList.toggle('hidden')">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg bg-green-100 flex items-center justify-center"><i class="fas fa-file-alt text-green-600 text-sm"></i></div>
                  <div><p class="font-semibold text-sm">${mat.judul}</p><p class="text-xs text-gray-400">${Utils.formatDate(mat.created_at)}</p></div></div>
                <i class="fas fa-chevron-down text-gray-300 text-sm"></i>
              </div>
              <div class="detail hidden mt-4 p-4 bg-gray-50 rounded-xl text-sm text-gray-600">
                <p>${mat.konten}</p>
                <div class="mt-3 flex items-center gap-2">
                  <button class="px-4 py-2 bg-green-600 text-white rounded-lg text-xs font-medium hover:bg-green-700 transition"><i class="fas fa-download mr-1"></i>${mat.file_url}</button>
                </div>
              </div>
            </div>`).join('')}
          </div>
        </div>`;
      });
      list.innerHTML = html || '<div class="text-center py-16 text-gray-400"><i class="fas fa-folder-open text-4xl mb-4"></i><p>Belum ada materi tersedia</p></div>';
    }
    document.getElementById('filter').addEventListener('change', render);
    render();
  </script>
</body>
</html>
