<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Studi - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center"><i class="fas fa-graduation-cap text-white"></i></div><span class="text-xl font-bold text-green-800">Polimicro</span></a>
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html" class="text-gray-600 hover:text-green-700 font-medium">Beranda</a>
        <a href="programs.html" class="text-green-700 font-semibold">Program</a>
      </div>
      <div class="flex items-center gap-3" id="nav-auth"></div>
    </div>
  </nav>

  <!-- Header -->
  <div class="gradient-hero py-16">
    <div class="max-w-7xl mx-auto px-6 text-center text-white">
      <h1 class="text-4xl font-bold mb-4">Program Studi</h1>
      <p class="text-green-200 text-lg max-w-2xl mx-auto">Temukan program microcredential yang sesuai dengan minat dan tujuan karir Anda</p>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-wrap gap-4 mb-8">
      <div class="relative flex-1 min-w-[250px]"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" id="search" placeholder="Cari program studi..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white">
      </div>
      <select id="filter-status" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-600">
        <option value="all">Semua Status</option><option value="aktif">Aktif</option><option value="nonaktif">Nonaktif</option>
      </select>
    </div>
    <div id="prodi-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <!-- Enroll Modal -->
  <div id="enroll-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full mx-4 fade-in">
      <div class="text-center">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-green-100 flex items-center justify-center mb-4" id="modal-icon"></div>
        <h3 class="text-xl font-bold mb-2" id="modal-title"></h3>
        <p class="text-gray-500 text-sm mb-6" id="modal-desc"></p>
      </div>
      <div id="modal-info" class="space-y-3 mb-6"></div>
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Batal</button>
        <button onclick="confirmEnroll()" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold">Daftar</button>
      </div>
    </div>
  </div>

  <script src="assets/js/data.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/utils.js"></script>
  <script>
    let selectedProdi = null;
    const navAuth = document.getElementById('nav-auth');
    if (Auth.isLoggedIn()) {
      const s = Auth.getSession();
      navAuth.innerHTML = `<a href="${Auth.getDashboardPath(s.role)}" class="px-5 py-2.5 btn-primary text-white rounded-xl font-medium text-sm"><i class="fas fa-th-large mr-2"></i>Dashboard</a>`;
    } else {
      navAuth.innerHTML = `<a href="login.html" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium text-sm hover:bg-gray-50">Masuk</a><a href="register.html" class="px-5 py-2.5 btn-primary text-white rounded-xl font-medium text-sm">Daftar</a>`;
    }

    function renderProdi() {
      const search = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      let filtered = PoliData.prodi.filter(p => {
        const matchSearch = p.nama.toLowerCase().includes(search) || p.deskripsi.toLowerCase().includes(search);
        const matchStatus = status === 'all' || p.status === status;
        return matchSearch && matchStatus;
      });
      const grid = document.getElementById('prodi-grid');
      if (filtered.length === 0) { grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400"><i class="fas fa-search text-4xl mb-4"></i><p>Tidak ada program ditemukan</p></div>'; return; }
      grid.innerHTML = filtered.map(p => {
        const matkuls = PoliData.getMatkulByProdi(p.id);
        const dosen = [...new Set(matkuls.map(m => m.dosen_id))].map(id => PoliData.getUserById(id)).filter(Boolean);
        return `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden card-hover fade-in">
          <div class="gradient-card p-6"><div class="text-4xl mb-3">${p.icon}</div><h3 class="text-xl font-bold text-green-900">${p.nama}</h3></div>
          <div class="p-6">
            <p class="text-gray-500 text-sm mb-4 line-clamp-3">${p.deskripsi}</p>
            <div class="space-y-2 text-sm mb-6">
              <div class="flex justify-between"><span class="text-gray-400">Durasi</span><span class="font-medium">${p.durasi}</span></div>
              <div class="flex justify-between"><span class="text-gray-400">Mata Kuliah</span><span class="font-medium">${matkuls.length} Matkul</span></div>
              <div class="flex justify-between"><span class="text-gray-400">Status</span>${Utils.statusBadge(p.status)}</div>
            </div>
            ${p.status === 'aktif' ? `<button onclick="openEnroll(${p.id})" class="w-full py-3 btn-primary text-white rounded-xl font-semibold text-sm"><i class="fas fa-plus-circle mr-2"></i>Daftar Program</button>` : `<button disabled class="w-full py-3 bg-gray-100 text-gray-400 rounded-xl font-medium text-sm cursor-not-allowed">Tidak Tersedia</button>`}
          </div>
        </div>`;
      }).join('');
    }

    function openEnroll(prodiId) {
      if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
      selectedProdi = PoliData.getProdiById(prodiId);
      document.getElementById('modal-icon').innerHTML = `<span class="text-3xl">${selectedProdi.icon}</span>`;
      document.getElementById('modal-title').textContent = selectedProdi.nama;
      document.getElementById('modal-desc').textContent = 'Anda akan mendaftar pada program studi ini';
      document.getElementById('modal-info').innerHTML = `<div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span class="text-gray-500">Durasi</span><span class="font-medium">${selectedProdi.durasi}</span></div><div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span class="text-gray-500">Jumlah Matkul</span><span class="font-medium">${selectedProdi.jumlah_matkul}</span></div>`;
      document.getElementById('enroll-modal').classList.remove('hidden');
      document.getElementById('enroll-modal').classList.add('flex');
    }
    function closeModal() { document.getElementById('enroll-modal').classList.add('hidden'); document.getElementById('enroll-modal').classList.remove('flex'); }
    function confirmEnroll() {
      const s = Auth.getSession();
      const existing = PoliData.pendaftaran.find(p => p.mahasiswa_id === s.id && p.prodi_id === selectedProdi.id);
      if (existing) { Utils.showToast('Anda sudah terdaftar di program ini!', 'warning'); closeModal(); return; }
      PoliData.pendaftaran.push({ id: Utils.generateId(PoliData.pendaftaran), mahasiswa_id: s.id, prodi_id: selectedProdi.id, status: 'pending', registered_at: new Date().toISOString().split('T')[0] });
      saveData(); Utils.showToast('Pendaftaran berhasil! Menunggu verifikasi admin.'); closeModal();
    }

    document.getElementById('search').addEventListener('input', renderProdi);
    document.getElementById('filter-status').addEventListener('change', renderProdi);
    renderProdi();
  </script>
</body>
</html>
