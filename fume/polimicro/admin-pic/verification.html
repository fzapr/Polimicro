<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Mahasiswa - Admin PIC - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['admin_pic'])) throw '';

    function renderPage() {
      const pendingList = PoliData.pendaftaran.filter(p => p.status === 'pending');
      const allList = PoliData.pendaftaran;
      document.getElementById('app').innerHTML = buildSidebar('admin_pic', 'verification') + `
      <main class="p-6 lg:p-8 fade-in">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Verifikasi Mahasiswa</h1>
        <p class="text-gray-500 mb-6">Verifikasi pendaftaran mahasiswa baru</p>

        <!-- Pending -->
        <div class="bg-white rounded-2xl border border-gray-100 mb-6 overflow-hidden">
          <div class="p-5 border-b border-gray-50 flex items-center justify-between">
            <h3 class="font-bold text-gray-900"><i class="fas fa-clock text-amber-500 mr-2"></i>Menunggu Verifikasi (${pendingList.length})</h3>
          </div>
          <div class="overflow-x-auto"><table class="w-full text-sm">
            <thead><tr class="bg-gray-50" style="background:#faf8f5"><th class="px-5 py-3 text-left font-semibold text-gray-600">Mahasiswa</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Program Studi</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Tanggal Daftar</th><th class="px-5 py-3 text-center font-semibold text-gray-600">Aksi</th></tr></thead>
            <tbody class="divide-y divide-gray-50">
              ${pendingList.map(p => {
                const mhs = PoliData.getUserById(p.mahasiswa_id);
                const prodi = PoliData.getProdiById(p.prodi_id);
                return `<tr class="hover:bg-gray-50">
                  <td class="px-5 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-xs font-bold text-amber-700">${mhs ? Utils.getInitials(mhs.nama) : '?'}</div><div><p class="font-medium">${mhs ? mhs.nama : '-'}</p><p class="text-xs text-gray-400">${mhs ? mhs.email : ''}</p></div></div></td>
                  <td class="px-5 py-4 text-gray-500">${prodi ? prodi.nama : '-'}</td>
                  <td class="px-5 py-4 text-gray-400 text-xs">${Utils.formatDate(p.registered_at)}</td>
                  <td class="px-5 py-4 text-center"><div class="flex gap-2 justify-center">
                    <button onclick="verify(${p.id},'diterima')" class="px-4 py-2 bg-green-50 text-green-600 rounded-lg text-xs hover:bg-green-100 font-medium"><i class="fas fa-check mr-1"></i>Terima</button>
                    <button onclick="verify(${p.id},'ditolak')" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-xs hover:bg-red-100 font-medium"><i class="fas fa-times mr-1"></i>Tolak</button>
                  </div></td>
                </tr>`;
              }).join('')}
              ${pendingList.length === 0 ? '<tr><td colspan="4" class="px-5 py-12 text-center text-gray-400"><i class="fas fa-check-circle text-3xl text-green-300 mb-2"></i><p>Semua pendaftaran sudah diverifikasi</p></td></tr>' : ''}
            </tbody>
          </table></div>
        </div>

        <!-- History -->
        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div class="p-5 border-b border-gray-50"><h3 class="font-bold text-gray-900"><i class="fas fa-history text-gray-400 mr-2"></i>Riwayat Verifikasi</h3></div>
          <div class="overflow-x-auto"><table class="w-full text-sm">
            <thead><tr class="bg-gray-50" style="background:#faf8f5"><th class="px-5 py-3 text-left font-semibold text-gray-600">Mahasiswa</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Program Studi</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Tanggal</th><th class="px-5 py-3 text-center font-semibold text-gray-600">Status</th></tr></thead>
            <tbody class="divide-y divide-gray-50">
              ${allList.filter(p => p.status !== 'pending').map(p => {
                const mhs = PoliData.getUserById(p.mahasiswa_id);
                const prodi = PoliData.getProdiById(p.prodi_id);
                return `<tr class="hover:bg-gray-50">
                  <td class="px-5 py-4 font-medium">${mhs ? mhs.nama : '-'}</td>
                  <td class="px-5 py-4 text-gray-500">${prodi ? prodi.nama : '-'}</td>
                  <td class="px-5 py-4 text-gray-400 text-xs">${Utils.formatDate(p.registered_at)}</td>
                  <td class="px-5 py-4 text-center">${Utils.statusBadge(p.status)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>
        </div>
      </main>` + closeSidebarLayout();
    }

    function verify(pendaftaranId, status) {
      const i = PoliData.pendaftaran.findIndex(p => p.id === pendaftaranId);
      if (i !== -1) {
        PoliData.pendaftaran[i].status = status;
        // Also update user status if accepted
        if (status === 'diterima') {
          const ui = PoliData.users.findIndex(u => u.id === PoliData.pendaftaran[i].mahasiswa_id);
          if (ui !== -1) PoliData.users[ui].status = 'aktif';
        }
        saveData(); renderPage(); Utils.showToast(status === 'diterima' ? 'Mahasiswa diterima!' : 'Pendaftaran ditolak', status === 'diterima' ? 'success' : 'warning');
      }
    }
    renderPage();
  </script>
</body>
</html>
