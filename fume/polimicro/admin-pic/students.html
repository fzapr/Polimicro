<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Pelajar - Admin PIC - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['admin_pic'])) throw '';
    document.getElementById('app').innerHTML = buildSidebar('admin_pic', 'students') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Data Pelajar</h1>
      <p class="text-gray-500 mb-6">Kelola data mahasiswa per program studi</p>
      <div class="flex flex-wrap gap-4 mb-6">
        <select id="filter-prodi" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm" onchange="render()">
          <option value="all">Semua Prodi</option>
          ${PoliData.prodi.map(p => `<option value="${p.id}">${p.nama}</option>`).join('')}
        </select>
        <div class="relative flex-1 min-w-[200px]"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="search" placeholder="Cari mahasiswa..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white text-sm" oninput="render()">
        </div>
      </div>
      <div id="student-list"></div>
    </main>` + closeSidebarLayout();

    function render() {
      const prodiFilter = document.getElementById('filter-prodi').value;
      const search = document.getElementById('search').value.toLowerCase();
      const list = document.getElementById('student-list');

      let students = PoliData.getMahasiswaList();
      if (prodiFilter !== 'all') {
        const enrolledIds = PoliData.getPendaftaranByProdi(parseInt(prodiFilter)).filter(p => p.status === 'diterima').map(p => p.mahasiswa_id);
        students = students.filter(s => enrolledIds.includes(s.id));
      }
      if (search) students = students.filter(s => s.nama.toLowerCase().includes(search) || s.email.toLowerCase().includes(search) || (s.nim || '').includes(search));

      list.innerHTML = `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="p-5 border-b border-gray-50 flex justify-between"><span class="font-bold text-gray-900">Daftar Mahasiswa</span><span class="text-sm text-gray-400">${students.length} data</span></div>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="bg-gray-50"><th class="px-5 py-3 text-left font-semibold text-gray-600">Nama</th><th class="px-5 py-3 text-left font-semibold text-gray-600">NIM</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Email</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Telepon</th><th class="px-5 py-3 text-center font-semibold text-gray-600">Status</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Prodi</th></tr></thead>
          <tbody class="divide-y divide-gray-50">
            ${students.map(s => {
              const prodiNames = PoliData.getPendaftaranByMahasiswa(s.id).filter(p => p.status === 'diterima').map(p => { const pr = PoliData.getProdiById(p.prodi_id); return pr ? pr.nama : ''; }).join(', ');
              return `<tr class="hover:bg-gray-50">
                <td class="px-5 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-xs font-bold text-green-700">${Utils.getInitials(s.nama)}</div><span class="font-medium">${s.nama}</span></div></td>
                <td class="px-5 py-4 text-gray-500 font-mono text-xs">${s.nim || '-'}</td>
                <td class="px-5 py-4 text-gray-500 text-xs">${s.email}</td>
                <td class="px-5 py-4 text-gray-400 text-xs">${s.phone || '-'}</td>
                <td class="px-5 py-4 text-center">${Utils.statusBadge(s.status)}</td>
                <td class="px-5 py-4 text-gray-500 text-xs">${prodiNames || '-'}</td>
              </tr>`;
            }).join('')}
            ${students.length === 0 ? '<tr><td colspan="6" class="px-5 py-12 text-center text-gray-400">Tidak ada data</td></tr>' : ''}
          </tbody>
        </table></div>
      </div>`;
    }
    render();
  </script>
</body>
</html>
