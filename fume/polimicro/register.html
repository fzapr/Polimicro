<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex">
  <div class="hidden lg:flex lg:w-1/2 items-center justify-center p-12 relative overflow-hidden" style="background:linear-gradient(135deg,#0D3B12 0%,#1B5E20 50%,#2E7D32 100%)">
    <div class="absolute inset-0 opacity-10"><div class="absolute bottom-20 right-10 w-96 h-96 bg-green-300 rounded-full blur-3xl"></div></div>
    <div class="relative z-10 text-center">
      <div class="w-20 h-20 mx-auto rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center mb-8"><i class="fas fa-user-plus text-4xl"></i></div>
      <h2 class="text-4xl font-bold mb-4 text-white">Mulai Perjalanan Anda!</h2>
      <p class="text-white/70 text-lg max-w-md">Daftarkan diri Anda untuk mengikuti program microcredential berkualitas di Polimicro.</p>
    </div>
  </div>
  <div class="flex-1 flex items-center justify-center p-8" style="background:#faf8f5">
    <div class="w-full max-w-md fade-in">
      <a href="index.html" class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center"><i class="fas fa-graduation-cap text-white"></i></div>
        <span class="text-2xl font-bold text-green-800">Polimicro</span>
      </a>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Buat Akun Baru</h1>
      <p class="text-gray-500 mb-6">Isi data diri Anda untuk mendaftar sebagai mahasiswa</p>
      <div id="error-msg" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>
      <div id="success-msg" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-600 text-sm"></div>
      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nama Lengkap</label>
          <div class="relative"><i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="nama" required placeholder="Masukkan nama lengkap" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white transition"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <div class="relative"><i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="email" required placeholder="nama@email.com" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white transition"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">No. Telepon</label>
          <div class="relative"><i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="tel" id="phone" placeholder="08xxxxxxxxxx" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white transition"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative"><i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="password" required minlength="6" placeholder="Minimal 6 karakter" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white transition"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Konfirmasi Password</label>
          <div class="relative"><i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="confirm-password" required placeholder="Ulangi password" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white transition"></div>
        </div>
        <div class="flex items-start gap-2 text-sm">
          <input type="checkbox" id="agree" required class="mt-1 rounded border-gray-300 text-green-600">
          <label for="agree" class="text-gray-600">Saya menyetujui <a href="#" class="text-green-600 font-medium">Syarat & Ketentuan</a> yang berlaku</label>
        </div>
        <button type="submit" class="w-full py-3.5 btn-primary text-white rounded-xl font-semibold text-lg"><i class="fas fa-user-plus mr-2"></i>Daftar Sekarang</button>
      </form>
      <p class="text-center text-gray-500 mt-6">Sudah punya akun? <a href="login.html" class="text-green-600 font-semibold hover:text-green-700">Masuk</a></p>
    </div>
  </div>
  <script src="assets/js/data.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/utils.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      const pw = document.getElementById('password').value, cpw = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('error-msg'), sucEl = document.getElementById('success-msg');
      errEl.classList.add('hidden'); sucEl.classList.add('hidden');
      if (pw !== cpw) { errEl.textContent = 'Password tidak cocok!'; errEl.classList.remove('hidden'); return; }
      const result = Auth.register({ nama: document.getElementById('nama').value, email: document.getElementById('email').value, password: pw, phone: document.getElementById('phone').value });
      if (result.success) { sucEl.innerHTML = 'Registrasi berhasil! Akun Anda menunggu verifikasi admin. <a href="login.html" class="font-bold underline">Masuk</a>'; sucEl.classList.remove('hidden'); document.getElementById('register-form').reset(); }
      else { errEl.textContent = result.message; errEl.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
