<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matkul Saya - Dosen - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['dosen'])) throw '';
    const user = Auth.getCurrentUser();
    const myMatkul = PoliData.getMatkulByDosen(user.id);

    document.getElementById('app').innerHTML = buildSidebar('dosen', 'my-courses') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Mata Kuliah Saya</h1>
      <p class="text-gray-500 mb-6">Daftar mata kuliah yang Anda ampu</p>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        ${myMatkul.map(m => {
          const prodi = PoliData.getProdiById(m.prodi_id);
          const materiCount = PoliData.getMateriByMatkul(m.id).length;
          const tugasCount = PoliData.getTugasByMatkul(m.id).length;
          const studentCount = PoliData.getPendaftaranByProdi(m.prodi_id).filter(p => p.status === 'diterima').length;
          return `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden card-hover">
            <div class="gradient-card p-5"><h3 class="font-bold text-green-900">${m.nama}</h3><p class="text-green-700 text-xs mt-1">${prodi ? prodi.nama : ''}</p></div>
            <div class="p-5">
              <p class="text-gray-500 text-sm mb-4">${m.deskripsi}</p>
              <div class="grid grid-cols-3 gap-2 text-center mb-4">
                <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${materiCount}</p><p class="text-[10px] text-gray-400">Materi</p></div>
                <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${tugasCount}</p><p class="text-[10px] text-gray-400">Tugas</p></div>
                <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${studentCount}</p><p class="text-[10px] text-gray-400">Mahasiswa</p></div>
              </div>
              <div class="grid grid-cols-2 gap-2">
                <a href="materials.html?matkul=${m.id}" class="text-center py-2 text-xs btn-primary text-white rounded-xl font-medium">Materi</a>
                <a href="assignments.html?matkul=${m.id}" class="text-center py-2 text-xs bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200">Tugas</a>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </main>` + closeSidebarLayout();
  </script>
</body>
</html>
