<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Mahasiswa - Dosen - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['dosen'])) throw '';
    const user = Auth.getCurrentUser();
    const myMatkul = PoliData.getMatkulByDosen(user.id);

    document.getElementById('app').innerHTML = buildSidebar('dosen', 'students') + `
    <main class="p-6 lg:p-8 fade-in">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Daftar Mahasiswa</h1>
      <p class="text-gray-500 mb-6">Mahasiswa yang terdaftar per mata kuliah</p>
      <select id="filter" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm mb-6" onchange="render()">
        ${myMatkul.map((m, i) => `<option value="${m.id}" ${i === 0 ? 'selected' : ''}>${m.nama}</option>`).join('')}
      </select>
      <div id="student-list"></div>
    </main>` + closeSidebarLayout();

    function render() {
      const matkulId = parseInt(document.getElementById('filter').value);
      const matkul = PoliData.getMatkulById(matkulId);
      const enrollments = PoliData.getPendaftaranByProdi(matkul.prodi_id).filter(p => p.status === 'diterima');
      const list = document.getElementById('student-list');

      list.innerHTML = `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="p-5 border-b border-gray-50 flex justify-between"><h3 class="font-bold">${matkul.nama}</h3><span class="text-sm text-gray-400">${enrollments.length} mahasiswa</span></div>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="bg-gray-50" style="background:#faf8f5"><th class="px-5 py-3 text-left font-semibold text-gray-600">No</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Mahasiswa</th><th class="px-5 py-3 text-left font-semibold text-gray-600">NIM</th><th class="px-5 py-3 text-left font-semibold text-gray-600">Email</th><th class="px-5 py-3 text-center font-semibold text-gray-600">Tugas Dikumpul</th></tr></thead>
          <tbody class="divide-y divide-gray-50">
            ${enrollments.map((e, i) => {
              const mhs = PoliData.getUserById(e.mahasiswa_id);
              if (!mhs) return '';
              const subs = PoliData.getSubmissionsByMahasiswa(mhs.id).filter(s => {
                const t = PoliData.tugas.find(x => x.id === s.tugas_id);
                return t && t.matkul_id === matkulId;
              });
              return `<tr class="hover:bg-gray-50">
                <td class="px-5 py-4 text-gray-400">${i + 1}</td>
                <td class="px-5 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-xs font-bold text-green-700">${Utils.getInitials(mhs.nama)}</div><span class="font-medium">${mhs.nama}</span></div></td>
                <td class="px-5 py-4 text-gray-500 font-mono text-xs">${mhs.nim || '-'}</td>
                <td class="px-5 py-4 text-gray-500 text-xs">${mhs.email}</td>
                <td class="px-5 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">${subs.length}</span></td>
              </tr>`;
            }).join('')}
            ${enrollments.length === 0 ? '<tr><td colspan="5" class="px-5 py-12 text-center text-gray-400">Belum ada mahasiswa terdaftar</td></tr>' : ''}
          </tbody>
        </table></div>
      </div>`;
    }
    render();
  </script>
</body>
</html>
