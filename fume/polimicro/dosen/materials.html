<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Materi - Dosen - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <div id="materi-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full mx-4 fade-in">
      <h3 class="text-xl font-bold mb-4" id="mm-title">Tambah Materi</h3>
      <form id="materi-form" class="space-y-4">
        <input type="hidden" id="mf-id">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Mata Kuliah</label><select id="mf-matkul" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></select></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Judul Materi</label><input type="text" id="mf-judul" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Konten / Deskripsi</label><textarea id="mf-konten" rows="4" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></textarea></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Nama File</label><input type="text" id="mf-file" placeholder="materi.pdf" class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        <div class="flex gap-3">
          <button type="button" onclick="closeMateriModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium">Batal</button>
          <button type="submit" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold">Simpan</button>
        </div>
      </form>
    </div>
  </div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['dosen'])) throw '';
    const user = Auth.getCurrentUser();
    const myMatkul = PoliData.getMatkulByDosen(user.id);
    const params = new URLSearchParams(window.location.search);
    const filterMatkul = params.get('matkul');

    function renderPage() {
      document.getElementById('app').innerHTML = buildSidebar('dosen', 'materials') + `
      <main class="p-6 lg:p-8 fade-in">
        <div class="flex items-center justify-between mb-6">
          <div><h1 class="text-2xl font-bold text-gray-900">Kelola Materi</h1><p class="text-gray-500">Tambah, edit, atau hapus materi pembelajaran</p></div>
          <button onclick="openAddMateri()" class="px-5 py-3 btn-primary text-white rounded-xl font-semibold text-sm"><i class="fas fa-plus mr-2"></i>Tambah Materi</button>
        </div>
        <select id="filter" class="px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm mb-6" onchange="renderList()">
          <option value="all">Semua Mata Kuliah</option>
          ${myMatkul.map(m => `<option value="${m.id}" ${filterMatkul == m.id ? 'selected' : ''}>${m.nama}</option>`).join('')}
        </select>
        <div id="materi-list"></div>
      </main>` + closeSidebarLayout();
      renderList();
    }

    function renderList() {
      const f = document.getElementById('filter').value;
      const matkuls = f === 'all' ? myMatkul : myMatkul.filter(m => m.id == f);
      const list = document.getElementById('materi-list');
      let html = '';
      matkuls.forEach(m => {
        const items = PoliData.getMateriByMatkul(m.id);
        if (!items.length && f === 'all') return;
        html += `<div class="bg-white rounded-2xl border border-gray-100 mb-4 overflow-hidden">
          <div class="p-5 border-b border-gray-50 flex justify-between items-center"><h3 class="font-bold">${m.nama}</h3><span class="text-xs text-gray-400">${items.length} materi</span></div>
          <div class="divide-y divide-gray-50">${items.length ? items.map(mat => `<div class="p-5 flex items-center justify-between hover:bg-gray-50 transition">
            <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg bg-green-100 flex items-center justify-center"><i class="fas fa-file-alt text-green-600 text-sm"></i></div>
              <div><p class="font-semibold text-sm">${mat.judul}</p><p class="text-xs text-gray-400">${Utils.formatDate(mat.created_at)} • ${mat.file_url || 'No file'}</p></div></div>
            <div class="flex gap-2">
              <button onclick="editMateri(${mat.id})" class="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg text-xs hover:bg-blue-100"><i class="fas fa-edit"></i></button>
              <button onclick="deleteMateri(${mat.id})" class="px-3 py-2 bg-red-50 text-red-600 rounded-lg text-xs hover:bg-red-100"><i class="fas fa-trash"></i></button>
            </div>
          </div>`).join('') : '<p class="p-5 text-gray-400 text-sm text-center">Belum ada materi</p>'}</div>
        </div>`;
      });
      list.innerHTML = html || '<div class="text-center py-16 text-gray-400"><i class="fas fa-folder-open text-4xl mb-4"></i><p>Belum ada materi</p></div>';
    }

    function openAddMateri() {
      document.getElementById('mm-title').textContent = 'Tambah Materi';
      document.getElementById('mf-id').value = '';
      document.getElementById('mf-judul').value = '';
      document.getElementById('mf-konten').value = '';
      document.getElementById('mf-file').value = '';
      const sel = document.getElementById('mf-matkul');
      sel.innerHTML = myMatkul.map(m => `<option value="${m.id}">${m.nama}</option>`).join('');
      document.getElementById('materi-modal').classList.remove('hidden');
      document.getElementById('materi-modal').classList.add('flex');
    }
    function editMateri(id) {
      const mat = PoliData.materi.find(m => m.id === id);
      if (!mat) return;
      document.getElementById('mm-title').textContent = 'Edit Materi';
      document.getElementById('mf-id').value = mat.id;
      document.getElementById('mf-judul').value = mat.judul;
      document.getElementById('mf-konten').value = mat.konten;
      document.getElementById('mf-file').value = mat.file_url || '';
      const sel = document.getElementById('mf-matkul');
      sel.innerHTML = myMatkul.map(m => `<option value="${m.id}" ${m.id === mat.matkul_id ? 'selected' : ''}>${m.nama}</option>`).join('');
      document.getElementById('materi-modal').classList.remove('hidden');
      document.getElementById('materi-modal').classList.add('flex');
    }
    function closeMateriModal() { document.getElementById('materi-modal').classList.add('hidden'); document.getElementById('materi-modal').classList.remove('flex'); }
    function deleteMateri(id) {
      if (!confirm('Hapus materi ini?')) return;
      PoliData.materi = PoliData.materi.filter(m => m.id !== id);
      saveData(); renderList(); Utils.showToast('Materi dihapus');
    }

    document.getElementById('materi-form').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('mf-id').value;
      const data = { matkul_id: parseInt(document.getElementById('mf-matkul').value), judul: document.getElementById('mf-judul').value, konten: document.getElementById('mf-konten').value, file_url: document.getElementById('mf-file').value };
      if (id) { const i = PoliData.materi.findIndex(m => m.id == id); if (i !== -1) Object.assign(PoliData.materi[i], data); }
      else { PoliData.materi.push({ id: Utils.generateId(PoliData.materi), ...data, created_at: new Date().toISOString().split('T')[0] }); }
      saveData(); closeMateriModal(); renderList(); Utils.showToast(id ? 'Materi diperbarui' : 'Materi ditambahkan');
    });

    renderPage();
  </script>
</body>
</html>
