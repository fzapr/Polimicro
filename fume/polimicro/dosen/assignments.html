<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Penugasan - Dosen - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50" style="background:#faf8f5">
  <div id="app"></div>
  <div id="tugas-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full mx-4 fade-in">
      <h3 class="text-xl font-bold mb-4" id="tm-title">Tambah Tugas</h3>
      <form id="tugas-form" class="space-y-4">
        <input type="hidden" id="tf-id">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Mata Kuliah</label><select id="tf-matkul" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></select></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Judul Tugas</label><input type="text" id="tf-judul" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Deskripsi</label><textarea id="tf-desc" rows="3" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></textarea></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Deadline</label><input type="date" id="tf-deadline" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Nilai Maksimal</label><input type="number" id="tf-max" value="100" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeTugasModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium">Batal</button>
          <button type="submit" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold">Simpan</button>
        </div>
      </form>
    </div>
  </div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['dosen'])) throw '';
    const user = Auth.getCurrentUser();
    const myMatkul = PoliData.getMatkulByDosen(user.id);

    document.getElementById('app').innerHTML = buildSidebar('dosen', 'assignments') + `
    <main class="p-6 lg:p-8 fade-in">
      <div class="flex items-center justify-between mb-6">
        <div><h1 class="text-2xl font-bold text-gray-900">Kelola Penugasan</h1><p class="text-gray-500">Buat dan kelola tugas untuk mahasiswa</p></div>
        <button onclick="openAdd()" class="px-5 py-3 btn-primary text-white rounded-xl font-semibold text-sm"><i class="fas fa-plus mr-2"></i>Buat Tugas</button>
      </div>
      <div id="tugas-list"></div>
    </main>` + closeSidebarLayout();

    function render() {
      const list = document.getElementById('tugas-list');
      let html = '';
      myMatkul.forEach(m => {
        const tasks = PoliData.getTugasByMatkul(m.id);
        if (!tasks.length) return;
        html += `<div class="bg-white rounded-2xl border border-gray-100 mb-4 overflow-hidden">
          <div class="p-5 border-b border-gray-50"><h3 class="font-bold">${m.nama}</h3></div>
          <div class="divide-y divide-gray-50">${tasks.map(t => {
            const subs = PoliData.getSubmissionsByTugas(t.id);
            return `<div class="p-5 hover:bg-gray-50 transition">
              <div class="flex items-start justify-between">
                <div><p class="font-semibold">${t.judul}</p><p class="text-sm text-gray-500 mt-1">${t.deskripsi}</p>
                  <div class="flex gap-4 mt-2 text-xs text-gray-400">
                    <span><i class="fas fa-calendar mr-1"></i>${Utils.formatDate(t.deadline)}</span>
                    <span><i class="fas fa-inbox mr-1"></i>${subs.length} pengumpulan</span>
                    <span><i class="fas fa-star mr-1"></i>Maks: ${t.max_nilai}</span>
                  </div>
                </div>
                <div class="flex gap-2">
                  <a href="submissions.html?tugas=${t.id}" class="px-3 py-2 bg-green-50 text-green-600 rounded-lg text-xs hover:bg-green-100"><i class="fas fa-inbox"></i></a>
                  <button onclick="editTugas(${t.id})" class="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg text-xs hover:bg-blue-100"><i class="fas fa-edit"></i></button>
                  <button onclick="deleteTugas(${t.id})" class="px-3 py-2 bg-red-50 text-red-600 rounded-lg text-xs hover:bg-red-100"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            </div>`;
          }).join('')}</div>
        </div>`;
      });
      list.innerHTML = html || '<div class="text-center py-16 text-gray-400"><i class="fas fa-clipboard text-4xl mb-4"></i><p>Belum ada tugas</p></div>';
    }

    function openAdd() {
      document.getElementById('tm-title').textContent = 'Buat Tugas Baru';
      document.getElementById('tf-id').value = '';
      document.getElementById('tf-judul').value = '';
      document.getElementById('tf-desc').value = '';
      document.getElementById('tf-deadline').value = '';
      document.getElementById('tf-max').value = 100;
      document.getElementById('tf-matkul').innerHTML = myMatkul.map(m => `<option value="${m.id}">${m.nama}</option>`).join('');
      document.getElementById('tugas-modal').classList.remove('hidden');
      document.getElementById('tugas-modal').classList.add('flex');
    }
    function editTugas(id) {
      const t = PoliData.tugas.find(x => x.id === id);
      if (!t) return;
      document.getElementById('tm-title').textContent = 'Edit Tugas';
      document.getElementById('tf-id').value = t.id;
      document.getElementById('tf-judul').value = t.judul;
      document.getElementById('tf-desc').value = t.deskripsi;
      document.getElementById('tf-deadline').value = t.deadline;
      document.getElementById('tf-max').value = t.max_nilai;
      document.getElementById('tf-matkul').innerHTML = myMatkul.map(m => `<option value="${m.id}" ${m.id === t.matkul_id ? 'selected' : ''}>${m.nama}</option>`).join('');
      document.getElementById('tugas-modal').classList.remove('hidden');
      document.getElementById('tugas-modal').classList.add('flex');
    }
    function closeTugasModal() { document.getElementById('tugas-modal').classList.add('hidden'); document.getElementById('tugas-modal').classList.remove('flex'); }
    function deleteTugas(id) { if (!confirm('Hapus tugas ini?')) return; PoliData.tugas = PoliData.tugas.filter(t => t.id !== id); saveData(); render(); Utils.showToast('Tugas dihapus'); }

    document.getElementById('tugas-form').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('tf-id').value;
      const data = { matkul_id: parseInt(document.getElementById('tf-matkul').value), judul: document.getElementById('tf-judul').value, deskripsi: document.getElementById('tf-desc').value, deadline: document.getElementById('tf-deadline').value, max_nilai: parseInt(document.getElementById('tf-max').value) };
      if (id) { const i = PoliData.tugas.findIndex(t => t.id == id); if (i !== -1) Object.assign(PoliData.tugas[i], data); }
      else { PoliData.tugas.push({ id: Utils.generateId(PoliData.tugas), ...data, created_at: new Date().toISOString().split('T')[0] }); }
      saveData(); closeTugasModal(); render(); Utils.showToast(id ? 'Tugas diperbarui' : 'Tugas dibuat');
    });
    render();
  </script>
</body>
</html>
