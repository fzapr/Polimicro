<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin Akademik - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['admin_akademik'])) throw '';
    const totalDosen = PoliData.getDosenList().length;
    const totalProdi = PoliData.prodi.length;
    const totalCerts = PoliData.sertifikat.length;
    const totalMhs = PoliData.getMahasiswaList().length;

    document.getElementById('app').innerHTML = buildSidebar('admin_akademik', 'dashboard') + `
    <main class="p-6 lg:p-8 fade-in">
      <div class="mb-8"><h1 class="text-2xl font-bold text-gray-900">Dashboard Admin Akademik</h1><p class="text-gray-500">Kelola data akademik institusi</p></div>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="rounded-2xl p-5 card-hover gradient-card border border-green-200">
          <div class="w-10 h-10 rounded-xl bg-green-600 flex items-center justify-center mb-3"><i class="fas fa-chalkboard-teacher text-white"></i></div>
          <p class="text-3xl font-bold text-green-900">${totalDosen}</p><p class="text-sm text-green-700">Total Dosen</p>
        </div>
        <div class="rounded-2xl p-5 card-hover bg-white border border-gray-100">
          <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center mb-3"><i class="fas fa-university text-blue-600"></i></div>
          <p class="text-3xl font-bold">${totalProdi}</p><p class="text-sm text-gray-500">Program Studi</p>
        </div>
        <div class="rounded-2xl p-5 card-hover bg-white border border-gray-100">
          <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center mb-3"><i class="fas fa-certificate text-amber-600"></i></div>
          <p class="text-3xl font-bold">${totalCerts}</p><p class="text-sm text-gray-500">Sertifikat Terbit</p>
        </div>
        <div class="rounded-2xl p-5 card-hover bg-white border border-gray-100">
          <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center mb-3"><i class="fas fa-users text-purple-600"></i></div>
          <p class="text-3xl font-bold">${totalMhs}</p><p class="text-sm text-gray-500">Total Mahasiswa</p>
        </div>
      </div>
      <div class="grid lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl border border-gray-100 p-6">
          <h2 class="font-bold text-gray-900 mb-4">Distribusi Mahasiswa per Prodi</h2>
          <canvas id="chart1" height="200"></canvas>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 p-6">
          <h2 class="font-bold text-gray-900 mb-4">Daftar Dosen</h2>
          <div class="space-y-3">${PoliData.getDosenList().map(d => {
            const matkulCount = PoliData.getMatkulByDosen(d.id).length;
            return `<div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50">
              <div class="w-10 h-10 rounded-full gradient-primary flex items-center justify-center text-white text-xs font-bold">${Utils.getInitials(d.nama)}</div>
              <div class="flex-1"><p class="font-medium text-sm">${d.nama}</p><p class="text-xs text-gray-400">${d.bidang || ''}</p></div>
              <span class="text-xs text-gray-400">${matkulCount} matkul</span>
            </div>`;
          }).join('')}</div>
        </div>
      </div>
    </main>` + closeSidebarLayout();

    const prodiLabels = PoliData.prodi.map(p => p.nama);
    const prodiData = PoliData.prodi.map(p => PoliData.getPendaftaranByProdi(p.id).filter(x => x.status === 'diterima').length);
    new Chart(document.getElementById('chart1'), {
      type: 'doughnut',
      data: { labels: prodiLabels, datasets: [{ data: prodiData, backgroundColor: ['#4CAF50','#2196F3','#FF9800','#9C27B0','#607D8B'], borderWidth: 0 }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  </script>
</body>
</html>
