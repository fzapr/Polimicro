<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Program Studi - Admin Akademik - Polimicro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <div id="prodi-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full mx-4 fade-in">
      <h3 class="text-xl font-bold mb-4" id="pm-title">Tambah Program Studi</h3>
      <form id="prodi-form" class="space-y-4">
        <input type="hidden" id="pf-id">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Nama Program Studi</label><input type="text" id="pf-nama" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Deskripsi</label><textarea id="pf-desc" rows="3" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></textarea></div>
        <div class="grid grid-cols-3 gap-4">
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Durasi</label><input type="text" id="pf-durasi" placeholder="6 Bulan" required class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Icon (Emoji)</label><input type="text" id="pf-icon" placeholder="💻" class="w-full px-4 py-3 rounded-xl border border-gray-200"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Status</label><select id="pf-status" class="w-full px-4 py-3 rounded-xl border border-gray-200"><option value="aktif">Aktif</option><option value="nonaktif">Nonaktif</option></select></div>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium">Batal</button>
          <button type="submit" class="flex-1 py-3 btn-primary text-white rounded-xl font-semibold">Simpan</button>
        </div>
      </form>
    </div>
  </div>
  <script src="../assets/js/data.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/utils.js"></script><script src="../assets/js/sidebar.js"></script>
  <script>
    if (!Auth.requireAuth(['admin_akademik'])) throw '';

    function render() {
      document.getElementById('app').innerHTML = buildSidebar('admin_akademik', 'programs') + `
      <main class="p-6 lg:p-8 fade-in">
        <div class="flex items-center justify-between mb-6">
          <div><h1 class="text-2xl font-bold text-gray-900">Kelola Program Studi</h1><p class="text-gray-500">Tambah dan kelola prodi microcredential</p></div>
          <button onclick="openAdd()" class="px-5 py-3 btn-primary text-white rounded-xl font-semibold text-sm"><i class="fas fa-plus mr-2"></i>Tambah Prodi</button>
        </div>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${PoliData.prodi.map(p => {
            const mkCount = PoliData.getMatkulByProdi(p.id).length;
            const enrollCount = PoliData.getPendaftaranByProdi(p.id).filter(x => x.status === 'diterima').length;
            return `<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden card-hover">
              <div class="gradient-card p-5 flex items-center justify-between">
                <div><span class="text-3xl">${p.icon}</span><h3 class="font-bold text-green-900 mt-2">${p.nama}</h3></div>
                ${Utils.statusBadge(p.status)}
              </div>
              <div class="p-5">
                <p class="text-gray-500 text-sm mb-4 line-clamp-2">${p.deskripsi}</p>
                <div class="grid grid-cols-3 gap-2 text-center mb-4">
                  <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${p.durasi}</p><p class="text-[10px] text-gray-400">Durasi</p></div>
                  <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${mkCount}</p><p class="text-[10px] text-gray-400">Matkul</p></div>
                  <div class="p-2 bg-gray-50 rounded-lg"><p class="font-bold text-sm">${enrollCount}</p><p class="text-[10px] text-gray-400">Mahasiswa</p></div>
                </div>
                <div class="flex gap-2">
                  <button onclick="editProdi(${p.id})" class="flex-1 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-medium hover:bg-blue-100"><i class="fas fa-edit mr-1"></i>Edit</button>
                  <button onclick="deleteProdi(${p.id})" class="flex-1 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-medium hover:bg-red-100"><i class="fas fa-trash mr-1"></i>Hapus</button>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </main>` + closeSidebarLayout();
    }

    function openAdd() { document.getElementById('pm-title').textContent = 'Tambah Program Studi'; ['pf-id','pf-nama','pf-desc','pf-durasi','pf-icon'].forEach(id => document.getElementById(id).value = ''); document.getElementById('pf-status').value = 'aktif'; showModal(); }
    function editProdi(id) { const p = PoliData.getProdiById(id); if (!p) return; document.getElementById('pm-title').textContent = 'Edit Program Studi'; document.getElementById('pf-id').value = p.id; document.getElementById('pf-nama').value = p.nama; document.getElementById('pf-desc').value = p.deskripsi; document.getElementById('pf-durasi').value = p.durasi; document.getElementById('pf-icon').value = p.icon; document.getElementById('pf-status').value = p.status; showModal(); }
    function showModal() { document.getElementById('prodi-modal').classList.remove('hidden'); document.getElementById('prodi-modal').classList.add('flex'); }
    function closeModal() { document.getElementById('prodi-modal').classList.add('hidden'); document.getElementById('prodi-modal').classList.remove('flex'); }
    function deleteProdi(id) { if (!confirm('Hapus program studi ini?')) return; PoliData.prodi = PoliData.prodi.filter(p => p.id !== id); saveData(); render(); Utils.showToast('Program studi dihapus'); }

    document.getElementById('prodi-form').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('pf-id').value;
      const data = { nama: document.getElementById('pf-nama').value, deskripsi: document.getElementById('pf-desc').value, durasi: document.getElementById('pf-durasi').value, icon: document.getElementById('pf-icon').value || '📚', status: document.getElementById('pf-status').value, jumlah_matkul: 0 };
      if (id) { const i = PoliData.prodi.findIndex(p => p.id == id); if (i !== -1) { data.jumlah_matkul = PoliData.prodi[i].jumlah_matkul; Object.assign(PoliData.prodi[i], data); } }
      else { PoliData.prodi.push({ id: Utils.generateId(PoliData.prodi), ...data }); }
      saveData(); closeModal(); render(); Utils.showToast(id ? 'Program studi diperbarui' : 'Program studi ditambahkan');
    });
    render();
  </script>
</body>
</html>
